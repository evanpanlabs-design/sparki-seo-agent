<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparki SEO Agent - Task Submit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #4A83F9;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #64748b;
      margin-bottom: 40px;
      font-size: 14px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3140;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
    }

    .input-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #2d3140;
      border-radius: 8px;
      background: #0f1117;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #4A83F9;
    }

    button {
      padding: 12px 24px;
      background: #4A83F9;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #3a6fd8; }
    button:disabled { background: #2d3140; color: #64748b; cursor: not-allowed; }

    .status-section {
      margin-top: 24px;
      display: none;
    }

    .task-id-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .task-id-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .task-id-value {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #4A83F9;
    }

    .progress-bar-wrap {
      background: #2d3140;
      border-radius: 8px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4A83F9, #6ba3ff);
      border-radius: 8px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-text {
      text-align: right;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 16px;
    }

    .stage-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid #2d3140;
    }

    .stage-label { color: #64748b; }
    .stage-value { color: #e2e8f0; font-weight: 500; }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-running { background: #1e3a5f; color: #60a5fa; }
    .status-done { background: #14532d; color: #4ade80; }
    .status-failed { background: #4a1515; color: #f87171; }
    .status-pending { background: #2d3140; color: #94a3b8; }

    .error-msg {
      background: #4a1515;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 13px;
      color: #f87171;
      display: none;
    }

    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #475569;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>SPARKI SEO AGENT</h1>
  <p class="subtitle">Video → Blog Pipeline</p>

  <div class="card">
    <div class="input-row">
      <input type="text" id="videoUrl" placeholder="Paste TikTok/Instagram video URL..." />
      <button id="submitBtn" onclick="submitTask()">Submit</button>
    </div>

    <div id="errorMsg" class="error-msg"></div>

    <div id="statusSection" class="status-section">
      <div class="task-id-row">
        <span class="task-id-label">Task ID</span>
        <span class="task-id-value" id="taskIdDisplay">—</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
      <div class="stage-row">
        <span class="stage-label">Status</span>
        <span class="status-badge status-pending" id="statusBadge">PENDING</span>
      </div>
      <div class="stage-row">
        <span class="stage-label">Current Stage</span>
        <span class="stage-value" id="stageDisplay">—</span>
      </div>
    </div>
  </div>

  <p class="hint">Test URL: https://www.tiktok.com/@annntastic/video/7625836931292630303</p>

  <script>
    let pollInterval = null;
    let currentTaskId = null;

    async function submitTask() {
      const url = document.getElementById('videoUrl').value.trim();
      if (!url) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Submitting...';
      hideError();

      try {
        const res = await fetch('http://127.0.0.1:5555/api/tasks', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ video_url: url, project_name: 'default' })
        });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Failed to submit');

        currentTaskId = data.task_id;
        document.getElementById('taskIdDisplay').textContent = currentTaskId;
        document.getElementById('statusSection').style.display = 'block';
        setBadge('pending', 'PENDING');
        document.getElementById('stageDisplay').textContent = '—';
        document.getElementById('progressBar').style.width = '0%';
        document.getElementById('progressText').textContent = '0%';
        btn.textContent = 'Submit';
        btn.disabled = false;

        startPolling();
      } catch (err) {
        showError(err.message);
        btn.disabled = false;
        btn.textContent = 'Submit';
      }
    }

    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(pollStatus, 2000);
    }

    async function pollStatus() {
      if (!currentTaskId) return;
      try {
        const res = await fetch(`http://127.0.0.1:5555/api/tasks/${currentTaskId}`);
        const data = await res.json();
        if (!res.ok) return;

        updateUI(data);
      } catch (e) { /* ignore */ }
    }

    function updateUI(data) {
      const pct = Math.round(data.progress * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = pct + '%';
      document.getElementById('stageDisplay').textContent = data.current_stage || '—';

      const status = data.status;
      setBadge(status, status.toUpperCase());

      if (status === 'done' || status === 'failed') {
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }
        if (status === 'failed') {
          showError(data.error || 'Pipeline failed');
        }
      }
    }

    function setBadge(status, label) {
      const el = document.getElementById('statusBadge');
      el.className = 'status-badge status-' + status;
      el.textContent = label;
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }
  </script>
</body>
</html>
