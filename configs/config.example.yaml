# Sparki SEO Blog Agent Configuration
# Copy this file to config.local.yaml and fill in your values
# config.local.yaml is gitignored (contains sensitive data)

gcp:
  project_id: "sparki-op"
  gcs_bucket_name: "sparki-op-test"
  # gcs_bucket_name: "your-gcs-bucket-name"  # For production

storage:
  # Local data root directory
  data_root: "data"
  # Base prefix for all data (should match GCS prefix)
  base_prefix: "Sparki_SEO_Blog_Agent_V2"

video:
  # yt-dlp options
  format: "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best"
  retries: 3
  timeout: 60

contentful:
  space_id: "your-space-id"
  access_token: "your-access-token"
  environment: "master"

llm:
  # Self-hosted LLM for intent parsing and QC
  api_url: "https://your-llm-endpoint.com/v1"
  api_key: "your-api-key"

proxy:
  http_proxy: "http://127.0.0.1:7897"
  https_proxy: "http://127.0.0.1:7897"